apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gaming-power
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: gaming-power-monitoring
  annotations:
    grafana_folder: Homelab
data:
