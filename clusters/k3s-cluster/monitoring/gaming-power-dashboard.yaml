    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "enable": true,
            "expr": "ALERTS{alertname=~\"GamingPower.*\",alertstate=\"firing\"}",
            "iconColor": "red",
            "name": "Gaming power alerts",
            "tagKeys": "alertname,severity,strip,outlet",
            "textFormat": "{{ alertname }} {{ strip }} {{ outlet }}",
            "titleFormat": "{{ severity }}",
            "type": "tags"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": true,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Electrical monitoring is only as accurate as the configured device ratings and exported telemetry. Use the actual strip and outlet ratings. For common US 120 V / 15 A hardware, continuous-load planning often uses 12 A / 1440 W, but this dashboard keeps every rating configurable.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 2
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "code": {
              "language": "plaintext",
              "showLineNumbers": false,
              "showMiniMap": false
            },
            "content": "Safety notes\\n\\n- Warning thresholds should be configured at 80% of each rated continuous capacity.\\n- Critical thresholds should be configured at 90% of each rated continuous capacity.\\n- Do not assume all strips or outlets have the same rating; map each physical device explicitly.\\n- Stale data is treated as unsafe telemetry because the dashboard can no longer prove current load.",
            "mode": "markdown"
          },
          "pluginVersion": "11.0.0",
          "title": "Safety and Configuration",
          "type": "text"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 80
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "on"
                },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "options": {
                          "0": {
                            "text": "Off"
                          },
                          "1": {
                            "text": "On"
                          }
                        },
                        "type": "value"
                      }
                    ]
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 4
          },
          "id": 2,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "gaming_power:outlet_watts{strip=~\"$strip\",outlet=~\"$outlet\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "watts",
              "refId": "A"
            },
            {
              "datasource": {
