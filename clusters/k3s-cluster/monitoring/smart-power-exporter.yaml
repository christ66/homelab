  exporter.py: |
    import json
    import os
    import time
    import urllib.error
    import urllib.request
    from datetime import datetime
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    CONFIG_PATH = os.environ.get("SMART_POWER_CONFIG", "/config/config.json")
    TOKEN = os.environ["HOME_ASSISTANT_TOKEN"]

    with open(CONFIG_PATH, "r", encoding="utf-8") as config_file:
        CONFIG = json.load(config_file)

    def labels(**values):
        return ",".join(f'{key}="{str(value).replace(chr(92), chr(92) + chr(92)).replace(chr(34), chr(92) + chr(34))}"' for key, value in values.items())

    def parse_float(state):
        try:
            return float(state)
        except (TypeError, ValueError):
            return None

    def parse_timestamp(value):
        if not value:
            return None
        try:
            return datetime.fromisoformat(value.replace("Z", "+00:00")).timestamp()
        except ValueError:
            return None

    def fetch_states():
        request = urllib.request.Request(
            CONFIG["home_assistant_url"].rstrip("/") + "/api/states",
            headers={
                "Authorization": "Bearer " + TOKEN,
                "Accept": "application/json",
            },
        )
        with urllib.request.urlopen(request, timeout=10) as response:
            return {item["entity_id"]: item for item in json.loads(response.read().decode("utf-8"))}

    def state_value(states, entity_id):
        if not entity_id:
            return None
        state = states.get(entity_id)
        if not state:
            return None
        return state.get("state")

    def numeric_metric(lines, name, value, **metric_labels):
        number = parse_float(value)
        if number is not None:
            lines.append(f"{name}{{{labels(**metric_labels)}}} {number}")

    def outlet_timestamp(states, entities):
        latest = None
        for entity_id in entities.values():
            state = states.get(entity_id)
            if not state:
                continue
            stamp = parse_timestamp(state.get("last_reported") or state.get("last_updated") or state.get("last_changed"))
            if stamp is not None:
                latest = max(latest or stamp, stamp)
        return latest

    def render_metrics():
        states = fetch_states()
        lines = [
            "# HELP smart_power_outlet_watts Outlet active power from Home Assistant.",
            "# TYPE smart_power_outlet_watts gauge",
        ]
        default_volts = float(CONFIG.get("default_rated_volts", 120))
        default_amps = float(CONFIG.get("default_rated_continuous_amps", 12))
        warning_ratio = float(CONFIG.get("warning_ratio", 0.8))
        critical_ratio = float(CONFIG.get("critical_ratio", 0.9))

        for strip in CONFIG["strips"]:
            strip_id = strip["strip"]
            if strip.get("disabled"):
                continue
            rated_volts = float(strip.get("rated_volts", default_volts))
            rated_amps = float(strip.get("rated_continuous_amps", default_amps))
            strip_capacity_watts = rated_volts * rated_amps
            strip_warning = strip_capacity_watts * warning_ratio
            strip_critical = strip_capacity_watts * critical_ratio
            lines.append(f'smart_power_strip_warning_watts{{{labels(strip=strip_id)}}} {strip_warning}')
            lines.append(f'smart_power_strip_critical_watts{{{labels(strip=strip_id)}}} {strip_critical}')

            strip_entities = strip.get("strip_entities", {})
            strip_voltage = state_value(states, strip_entities.get("voltage"))
            for outlet in strip.get("outlets", []):
                outlet_id = outlet["outlet"]
                outlet_name = outlet.get("name", outlet_id)
                entity_map = outlet["entities"]
                metric_labels = {"strip": strip_id, "outlet": outlet_id, "outlet_name": outlet_name}
                numeric_metric(lines, "smart_power_outlet_watts", state_value(states, entity_map.get("watts")), **metric_labels)
                numeric_metric(lines, "smart_power_outlet_amps", state_value(states, entity_map.get("amps")), **metric_labels)
                numeric_metric(lines, "smart_power_outlet_voltage_volts", state_value(states, entity_map.get("voltage")) or strip_voltage, **metric_labels)
                numeric_metric(lines, "smart_power_outlet_energy_kwh", state_value(states, entity_map.get("energy_kwh")), **metric_labels)
                outlet_on = 1 if state_value(states, entity_map.get("switch")) == "on" else 0
                lines.append(f"smart_power_outlet_on{{{labels(**metric_labels)}}} {outlet_on}")
                seen = outlet_timestamp(states, entity_map)
                if seen is not None:
                    lines.append(f"smart_power_outlet_last_seen_timestamp_seconds{{{labels(**metric_labels)}}} {seen}")
                outlet_capacity = float(outlet.get("rated_watts", strip_capacity_watts))
                lines.append(f"smart_power_outlet_warning_watts{{{labels(**metric_labels)}}} {outlet_capacity * warning_ratio}")
                lines.append(f"smart_power_outlet_critical_watts{{{labels(**metric_labels)}}} {outlet_capacity * critical_ratio}")

        shared_volts = float(CONFIG.get("shared_circuit_rated_volts", default_volts))
        shared_amps = float(CONFIG.get("shared_circuit_rated_continuous_amps", default_amps))
        shared_capacity_watts = shared_volts * shared_amps
        lines.append(f"smart_power_combined_warning_watts {shared_capacity_watts * warning_ratio}")
        lines.append(f"smart_power_combined_critical_watts {shared_capacity_watts * critical_ratio}")
        lines.append(f"smart_power_exporter_last_scrape_timestamp_seconds {time.time()}")
        return "\n".join(lines) + "\n"

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path not in ("/metrics", "/"):
                self.send_response(404)
                self.end_headers()
                return
            try:
                body = render_metrics().encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            except Exception as exc:
                body = f"smart_power_exporter_up 0\n# scrape_error {exc}\n".encode("utf-8")
                self.send_response(500)
                self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

    if __name__ == "__main__":
        port = int(CONFIG.get("listen_port", 9108))
        ThreadingHTTPServer(("0.0.0.0", port), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-power-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: smart-power-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smart-power-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smart-power-exporter
    spec:
      containers:
      - name: exporter
        image: python:3.13-alpine
        command:
        - python
        - "/config/exporter.py"
        env:
        - name: HOME_ASSISTANT_TOKEN
          valueFrom:
            secretKeyRef:
              name: smart-power-home-assistant-token
              key: token
        ports:
        - name: http-metrics
          containerPort: 9108
        readinessProbe:
          httpGet:
            path: "/metrics"
            port: http-metrics
          initialDelaySeconds: 5
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: "/metrics"
            port: http-metrics
          initialDelaySeconds: 30
          periodSeconds: 60
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - name: config
          mountPath: "/config"
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: smart-power-exporter
---
apiVersion: v1
kind: Service
metadata:
  name: smart-power-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: smart-power-exporter
spec:
  selector:
    app.kubernetes.io/name: smart-power-exporter
  ports:
  - name: http-metrics
    port: 9108
    targetPort: http-metrics
