apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-christou-cloud
  namespace: kube-system
spec:
  secretName: wildcard-christou-cloud-tls
  dnsNames:
    - "*.christou.cloud"
    - "christou.cloud"
  issuerRef:
    name: letsencrypt-acmedns
    kind: ClusterIssuer
---
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: kube-system
spec:
  defaultCertificate:
    secretName: wildcard-christou-cloud-tls
